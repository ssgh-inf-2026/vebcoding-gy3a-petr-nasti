<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Učební Plánovač: Co dnes dělat?</title>
    <style>
        /* CSS STYLING - Aby aplikace vypadala k světu */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { color: #2d3436; margin-bottom: 5px; }
        p.subtitle { color: #636e72; margin-bottom: 25px; font-size: 0.9em; }

        label {
            display: block;
            text-align: left;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2d3436;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #0984e3;
        }

        button {
            width: 100%;
            background-color: #0984e3;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, background 0.3s;
        }

        button:hover {
            background-color: #74b9ff;
            transform: translateY(-2px);
        }

        button:active { transform: translateY(0); }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background-color: #f1f2f6;
            text-align: left;
            min-height: 50px;
            border-left: 5px solid #0984e3;
        }

        .advice-item { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .advice-item::before { content: "•"; position: absolute; left: 0; color: #0984e3; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Plánovač učení</h1>
        <p class="subtitle">Zadej své povinnosti a já ti poradím, jak na ně.</p>
        
        <label for="userInput">S čím dnes bojuješ?</label>
        <textarea id="userInput" placeholder="Např.: Zítra písemka z matiky, nestíhám úkol..."></textarea>
        
        <button id="testButton">Vytvořit akční plán</button>

        <div id="result">
            <p style="color: #b2bec3; text-align: center;">Zde se objeví tvůj plán...</p>
        </div>
    </div>

    <script>
        /* JAVASCRIPT LOGIKA - Tady se generuje ten plán */
        document.getElementById('testButton').addEventListener('click', function() {
            const input = document.getElementById('userInput').value.toLowerCase().trim();
            const resultDiv = document.getElementById('result');

            if (input === "") {
                resultDiv.innerHTML = "<p style='color:#d63031; text-align:center;'>Musíš mi nejdřív něco napsat!</p>";
                return;
            }

            let title = "";
            let steps = [];

            // 1. SCÉNÁŘ: TEST / PÍSEMKA
            if (input.includes("test") || input.includes("písemka") || input.includes("zkoušení")) {
                title = "📚 Jak ovládnout látku na test:";
                steps = [
                    "<strong>Aktivní učení:</strong> Zakryj sešit a zkus látku vysvětlit nahlas zdi nebo psovi.",
                    "<strong>Priorita:</strong> Nauč se nejdřív to, co ti nejde. To, co umíš, si jen rychle projdi na konci.",
                    "<strong>Pomodoro:</strong> Uč se 25 minut, pak si dej 5 minut pauzu (vstaň a protáhni se)."
                ];
            } 
            // 2. SCÉNÁŘ: ÚKOLY / PROJEKTY
            else if (input.includes("úkol") || input.includes("referát") || input.includes("projekt")) {
                title = "✍️ Strategie pro úkoly:";
                steps = [
                    "<strong>Metoda 5 minut:</strong> Slib si, že na tom budeš dělat jen 5 minut. Uvidíš, že pak už nepřestaneš.",
                    "<strong>Digitální detox:</strong> Dej mobil do jiné místnosti, dokud úkol nedokončíš.",
                    "<strong>Osnova:</strong> Nejdřív si napiš v bodech, co tam musí být, až pak piš celý text."
                ];
            } 
            // 3. SCÉNÁŘ: PANIKA / NESTÍHÁM
            else if (input.includes("nestíhám") || input.includes("zítra")) {
                title = "🔥 Krizový režim (nestíhačka):";
                steps = [
                    "<strong>Pravidlo 80/20:</strong> Vyber si 3 nejdůležitější věci, které tě zachrání, zbytek teď ignoruj.",
                    "<strong>Bleskový přehled:</strong> Přečti si aspoň shrnutí kapitol na konci učebnice.",
                    "<strong>Spánek:</strong> I když je to zlé, jdi spát před půlnocí. Unavený mozek si ráno nic nevybaví."
                ];
            }
            // 4. OBECNÝ SCÉNÁŘ
            else {
                title = "💡 Obecná rada pro tebe:";
                steps = [
                    "Udělej nejdřív ten nejtěžší úkol dne (Sněz tu žábu!).",
                    "Pij hodně vody a vyvětrej si v pokoji.",
                    "Pamatuj, že i malý pokrok je lepší než žádný."
                ];
            }

            // Vykreslení výsledku do HTML
            let htmlOutput = `<h3 style="margin-top:0; color:#0984e3;">${title}</h3>`;
            steps.forEach(step => {
                htmlOutput += `<div class="advice-item">${step}</div>`;
            });
            
            resultDiv.innerHTML = htmlOutput;
        });
    </script>

</body>
</html>
