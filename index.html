<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Učební Plánovač</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <div class="container">
        <h1>📅 Co dnes dělat?</h1>
        
        <div class="card">
            <label for="userInput">Zadej své úkoly (např. test, referát, zítra...):</label>
            <textarea id="userInput" placeholder="Napiš sem, co tě čeká ve škole..."></textarea>
            <button id="testButton">Sestavit plán</button>
        </div>

        <div class="card">
            <h2>Tvůj akční plán:</h2>
            <div id="result">
                Zatím jsi nic nezadal.
            </div>
        </div>
    </div>

</body>
</html>
