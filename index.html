<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Učební plánovač: Co dnes dělat?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>📅 Co mám dnes dělat?</h1>
            <p>Tvůj osobní asistent pro efektivní učení a zvládání školy.</p>
        </header>

        <main>
            <section class="input-section">
                <label for="userInput">S čím dnes potřebuješ pomoct?</label>
                <textarea id="userInput" placeholder="Např.: Mám zítra test z matiky a nestíhám úkol z češtiny..."></textarea>
                
                <button id="testButton">Sestavit plán učení</button>
            </section>

            <section class="output-section">
                <h2>Tvůj akční plán:</h2>
                <div id="result" class="result-box">
                    Sem se vypíše tvoje strategie, až klikneš na tlačítko výše...
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Školní projekt - Plánovač učení</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
